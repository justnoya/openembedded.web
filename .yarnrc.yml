nodeLinker: node-modules
yarnPath: .yarn/releases/yarn.cjs
npmRegistryServer: "https://registry.npmjs.org"
unsafeHttpWhitelist: ["package-firewall.replit.local"]

# Suppress peer-dependency version-range warnings that don't cause runtime issues.
# emoji-mart@3 declares react@^16 but works fine with React 18.
logFilters:
  - code: YN0060
    level: discard
  - code: YN0086
    level: discard

packageExtensions:
  "emoji-mart@*":
    peerDependenciesMeta:
      react:
        optional: true
